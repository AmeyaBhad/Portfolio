            const ref = useRef(null);

                const node = ref.current;
                if (!node) return;
                const obs = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setInView(true);
                            obs.unobserve(entry.target);
                        }
                    },
                    { threshold, rootMargin: '0px 0px -50px 0px' }
                );
                obs.observe(node);
                return () => obs.disconnect();
            }, [threshold]);
            return [ref, inView];
        };

        const Reveal = ({ children, delay = 0, className = '', as: Tag = 'div' }) => {
            const [ref, inView] = useInView();

                    className={`reveal ${inView ? 'in-view' : ''} ${className}`}

                        </Reveal>
                        <div className="grid lg:grid-cols-[1.6fr_1fr] gap-12">
                            <div className="relative border-l-2 border-white/10 ml-3 pl-8 space-y-10">
                                {journey.map((item, i) => (
                                    <Reveal key={i} delay={i * 150}>
                                        <div className={`relative ${item.active ? '' : 'opacity-90'}`}>
                                            <div className={`absolute -left-[41px] top-1 w-4 h-4 rounded-full ${item.active ? 'bg-blue-500 ring-4 ring-blue-500/20 animate-pulse' : 'bg-slate-700 ring-4 ring-slate-700/20'}`}></div>
                                            <div className="flex flex-wrap items-baseline justify-between gap-2 mb-1">
                                                <h3 className="text-lg font-bold text-white">{item.title}</h3>
                                                <span className="text-xs text-slate-500 font-mono">{item.period}</span>
                                            </div>
                                            <p className={`text-sm font-semibold mb-2 ${item.type === 'work' ? 'text-purple-400' : 'text-blue-400'}`}>
                                                {item.type === 'work' ? '💼 ' : '🎓 '}{item.org}
                                            </p>
                                            <p className="text-slate-400 text-sm leading-relaxed">
                                                {item.detail}
                                            </p>
                                        </div>
                                    </Reveal>
                                ))}
                            </div>
                            <Reveal delay={200}>
                                <div className="bg-slate-900/40 p-8 rounded-3xl border border-white/10 backdrop-blur-sm h-fit card-lift">
                                    <div className="flex items-center justify-between mb-6">
                                        <h3 className="text-xl font-bold text-white flex items-center gap-2">
                                            <Award size={20} className="text-blue-400" /> Certifications
                                        </h3>
                                        <span className="text-[10px] font-bold uppercase tracking-widest text-blue-300 bg-blue-500/10 border border-blue-500/30 rounded-full px-2 py-0.5">
                                            {certificates.length}
                                        </span>
                                    </div>
                                    <div className={`space-y-4 ${certificates.length > 9 ? 'cert-scroll max-h-[440px] overflow-y-auto pr-2' : ''}`}>
                                        {certificates.map((cert, i) => {
                                            const inner = (
                                                <>
                                                    <p className="text-sm font-semibold text-white group-hover:text-blue-400 transition-colors flex items-center gap-1.5">
                                                        {cert.name}
                                                        {cert.pdf && <ExternalLink size={11} className="opacity-50 group-hover:opacity-100 group-hover:translate-x-0.5 transition-all" />}
                                                    </p>
                                                    <p className="text-xs text-slate-500 mt-1">{cert.issuer} · {cert.year}</p>
                                                </>
                                            );
                                            return cert.pdf ? (
                                                <a
                                                    key={i}
                                                    href={cert.pdf}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    className="group block border-l-2 border-blue-500/40 pl-4 hover:border-blue-400 transition-colors"
                                                >
                                                    {inner}
                                                </a>
                                            ) : (
                                                <div key={i} className="group border-l-2 border-blue-500/40 pl-4 hover:border-blue-400 transition-colors">
                                                    {inner}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </Reveal>
                        </div>
                    </section>

                    {/* Projects Section */}
                    <section id="projects" className="max-w-6xl mx-auto px-6 py-24">
                        <Reveal>
                            <div className="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
                                <div>
                                    <h2 className="text-3xl font-bold text-white mb-2">Featured Work</h2>
                                    <p className="text-slate-500">A collection of web applications and data-driven systems I've built.</p>
                                </div>
                                <div className="flex bg-white/5 p-1 rounded-xl border border-white/10 self-start">
                                    {['all', 'fullstack', 'frontend'].map(tab => (
                                        <button
                                            key={tab}
                                            onClick={() => setActiveTab(tab)}
                                            className={`px-4 py-1.5 rounded-lg text-xs font-bold uppercase tracking-wider transition-all duration-300 btn-press ${activeTab === tab ? 'bg-blue-600 text-white shadow-lg shadow-blue-600/30' : 'text-slate-500 hover:text-slate-300'}`}
                                        >
                                            {tab}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </Reveal>

                        <div className="grid md:grid-cols-2 gap-8">
                            {filteredProjects.map((project, idx) => (
                                <Reveal key={project.id} delay={idx * 120}>
                                <div className="group relative bg-slate-900/50 border border-white/10 rounded-3xl overflow-hidden hover:border-blue-500/50 card-lift h-full">
                                    <div className={`pointer-events-none absolute top-0 right-0 w-32 h-32 bg-gradient-to-br ${project.color} opacity-10 blur-3xl group-hover:opacity-20 transition-opacity`}></div>

                                    <div className="relative p-8">
                                        <div className="flex justify-between items-start mb-6">
                                            <div className={`w-12 h-12 rounded-2xl bg-gradient-to-br ${project.color} flex items-center justify-center shadow-lg group-hover:scale-110 group-hover:rotate-3 transition-transform duration-500`}>
                                                <Code2 size={24} className="text-white" />
                                            </div>
                                            <div className="flex gap-2">
                                                <a
                                                    href={project.github}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    aria-label={`${project.title} GitHub`}
                                                    title="View source on GitHub"
                                                    className="p-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg text-slate-400 hover:text-white hover:-translate-y-0.5 transition-all duration-300 btn-press"
                                                >
                                                    <Github size={18} />
                                                </a>
                                                {project.demo && (
                                                    <a
                                                        href={project.demo}
                                                        target="_blank"
                                                        rel="noopener noreferrer"
                                                        aria-label={`${project.title} live demo`}
                                                        title="Open live demo"
                                                        className="p-2 bg-blue-600/20 hover:bg-blue-600/30 border border-blue-500/30 rounded-lg text-blue-300 hover:text-white hover:-translate-y-0.5 transition-all duration-300 btn-press flex items-center gap-1.5 text-xs font-semibold"
                                                    >
                                                        <ExternalLink size={16} /> Live
                                                    </a>
                                                )}
                                            </div>
                                        </div>

                                        <h3 className="text-2xl font-bold text-white mb-3 group-hover:text-blue-400 transition-colors duration-300">{project.title}</h3>
                                        <p className="text-slate-400 text-sm leading-relaxed mb-8 min-h-[5rem]">
                                            {project.description}
                                        </p>

                                        <div className="flex flex-wrap gap-2">
                                            {project.tags.map(tag => (
                                                <span key={tag} className="skill-pill px-2 py-1 bg-white/5 text-[10px] font-bold uppercase tracking-widest text-slate-400 rounded border border-white/5">
                                                    {tag}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                </Reveal>
                            ))}
                        </div>
                    </section>

                    {/* CTA Section */}
                    <section id="contact" className="max-w-6xl mx-auto px-6 py-24 text-center">
                        <Reveal>
                            <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-12 md:p-20 rounded-[3rem] relative overflow-hidden card-lift">
                                <div className="absolute top-0 left-0 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-20"></div>
                                <div className="absolute -top-20 -right-20 w-64 h-64 bg-white/10 rounded-full blur-3xl anim-glow"></div>
                                <div className="absolute -bottom-20 -left-20 w-64 h-64 bg-purple-400/10 rounded-full blur-3xl anim-glow" style={{ animationDelay: '2s' }}></div>
                                <div className="relative z-10">
                                    <h2 className="text-4xl md:text-5xl font-bold text-white mb-6">Let's build something <br /> great together.</h2>
                                    <p className="text-blue-100 mb-10 text-lg max-w-xl mx-auto">
                                        I'm graduating from CDAC in 2026 and actively looking for full-stack developer roles. If you're hiring — or just want to talk tech — my inbox is open.
                                    </p>
                                    <div className="flex flex-wrap justify-center gap-4">
                                        <a href="mailto:ameyabhad@gmail.com" className="px-8 py-4 bg-white text-blue-700 font-bold rounded-2xl hover:scale-105 hover:shadow-xl hover:shadow-white/20 btn-press transition-all duration-300 flex items-center gap-2">
                                            <Mail size={20} /> Say Hello
                                        </a>
                                        <a
                                            href="https://www.linkedin.com/in/ameya-bhad"
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            className="px-8 py-4 bg-blue-800/30 text-white font-bold rounded-2xl border border-white/20 backdrop-blur-sm hover:bg-blue-800/40 hover:scale-105 btn-press transition-all duration-300 flex items-center gap-2"
                                        >
                                            <Linkedin size={20} /> Connect on LinkedIn
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </Reveal>
                    </section>

                    {/* Footer */}
                    <footer className="max-w-6xl mx-auto px-6 py-12 border-t border-white/5 text-center flex flex-col md:flex-row justify-between items-center gap-6">
                        <p className="text-slate-500 text-sm">© {new Date().getFullYear()} Ameya Bhad • Built with React & Tailwind</p>
                        <div className="flex items-center gap-6 text-slate-500">
                            <a
                                href="https://github.com/AmeyaBhad"
                                target="_blank"
                                rel="noopener noreferrer"
                                className="hover:text-blue-400 transition-colors"
                            >
                                GitHub
                            </a>
                            <a
                                href="https://www.linkedin.com/in/ameya-bhad"
                                target="_blank"
                                rel="noopener noreferrer"
                                className="hover:text-blue-400 transition-colors"
                            >
                                LinkedIn
                            </a>
                            <a
                                href="mailto:ameyabhad@gmail.com"
                                className="hover:text-blue-400 transition-colors"
                            >
                                Mail
                            </a>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
